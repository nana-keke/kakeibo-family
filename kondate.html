/* ============================================================
   ユーティリティ
   ============================================================ */
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function addDaysStr(dateStr, n) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function daysBetween(a, b) {
  return Math.round((new Date(b+"T00:00:00") - new Date(a+"T00:00:00")) / 86400000);
}
function computeAge(birthdate) {
  if (!birthdate) return null;
  const b = new Date(birthdate + "T00:00:00");
  const t = new Date();
  let age = t.getFullYear() - b.getFullYear();
  const m = t.getMonth() - b.getMonth();
  if (m < 0 || (m === 0 && t.getDate() < b.getDate())) age--;
  return age;
}
function sanitizeKey(str) {
  return String(str || "").trim().replace(/[.#$\[\]\/]/g, "_").slice(0, 120) || "item";
}
function uid() {
  return Math.random().toString(36).slice(2, 10);
}

/* ============================================================
   Firebase 初期化 & DB フック
   ============================================================ */
let dbInstance = null;
function getDb() {
  if (!dbInstance) {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    dbInstance = firebase.database();
  }
  return dbInstance;
}

function useDbValue(path, defaultValue) {
  const [value, setValue] = React.useState(defaultValue);
  const [loading, setLoading] = React.useState(true);
  React.useEffect(() => {
    const db = getDb();
    const ref = db.ref(path);
    const cb = snap => {
      const v = snap.val();
      setValue(v === null || v === undefined ? defaultValue : v);
      setLoading(false);
    };
    ref.on("value", cb, err => { console.error(err); setLoading(false); });
    return () => ref.off("value", cb);
  }, [path]);
  return [value, loading];
}

/* ============================================================
   Claude API 呼び出し
   ============================================================ */
async function callClaude(systemPrompt, userContent, maxTokens) {
  const res = await fetch(PROXY_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: AI_MODEL,
      max_tokens: maxTokens || 2000,
      system: systemPrompt,
      messages: [{ role: "user", content: userContent }]
    })
  });
  if (!res.ok) throw new Error("AI呼び出しに失敗しました（" + res.status + "）");
  const data = await res.json();
  const text = (data.content || []).map(b => b.text || "").join("");
  return { text, usage: data.usage || null };
}
function parseJsonLoose(text) {
  const cleaned = text.replace(/```json/gi, "").replace(/```/g, "").trim();
  return JSON.parse(cleaned);
}

/* ============================================================
   食材分類プロンプト（5.2 / 9章の考え方に基づく）
   ============================================================ */
const CLASSIFY_SYSTEM_PROMPT =
`あなたは家庭の買い物履歴から食材を分類するアシスタントです。
渡された購入品目のリストについて、それぞれ次を判定してください。

- name: 元の表記
- normalizedName: 表記ゆれを吸収した食材名（例:「キャベツ1玉」→「キャベツ」、「きゃべつ」→「キャベツ」）
- category: 次のいずれか
  - "vegetable"（野菜。まとめ買い・分割消費されやすいもの）
  - "meat_fish"（肉・魚介）
  - "frozen"（冷凍食品）
  - "dried_or_condiment"（乾物・缶詰・調味料など保存が効くもの）
  - "other"（上記に当てはまらない食材）
  - "non_food"（食材ではない。菓子・飲料・惣菜・日用品など）
- keep: 献立提案に使う在庫候補として残す価値があるか（true/false）。
  肉・魚介は基本的に false（購入当日に消費済みとみなす）。
  非食材、菓子・飲料・惣菜は false。

出力は次のJSON配列のみで返してください。説明文やマークダウンは不要です。
[{"name":"...", "normalizedName":"...", "category":"...", "keep":true}]`;

async function classifyItems(itemNames) {
  if (itemNames.length === 0) return [];
  const { text } = await callClaude(CLASSIFY_SYSTEM_PROMPT, JSON.stringify(itemNames), 1500);
  try {
    const arr = parseJsonLoose(text);
    return Array.isArray(arr) ? arr : [];
  } catch (e) {
    console.error("分類結果のパースに失敗", e, text);
    return [];
  }
}

/* 家計簿の entries から直近7日分の食材候補を取り込み、期限切れを掃除する */
async function syncInventoryFromKakeibo(entries, inventoryCandidates) {
  const db = getDb();
  const today = todayStr();
  const cutoff = addDaysStr(today, -7);

  // 1) 直近7日分の「食費」品目名を収集
  const names = new Set();
  Object.values(entries || {}).forEach(entry => {
    if (!entry || !entry.date || entry.date < cutoff) return;
    (entry.items || []).forEach(it => {
      if (it && it.category === "食費" && it.name) names.add(it.name);
    });
  });

  const updates = {};

  if (names.size > 0) {
    const classified = await classifyItems(Array.from(names));
    classified.forEach(c => {
      if (!c || !c.keep) return;
      if (!EXPIRE_DAYS.hasOwnProperty(c.category)) return;
      const key = sanitizeKey(c.normalizedName || c.name);
      const existing = (inventoryCandidates || {})[key];
      const expireDate = addDaysStr(today, EXPIRE_DAYS[c.category]);
      if (existing) {
        updates[key] = {
          ...existing,
          lastConfirmedDate: today,
          estimatedExpireDate: expireDate,
          status: existing.status === "removed" ? existing.status : "active"
        };
      } else {
        updates[key] = {
          name: c.name, normalizedName: c.normalizedName || c.name,
          category: c.category, source: "kakeibo_entries",
          firstSeenDate: today, lastConfirmedDate: today,
          estimatedExpireDate: expireDate, status: "active", memo: ""
        };
      }
    });
  }

  // 2) 期限切れの自動処理
  Object.entries(inventoryCandidates || {}).forEach(([key, item]) => {
    if (item.status === "active" && item.estimatedExpireDate && item.estimatedExpireDate < today) {
      updates[key] = { ...item, status: "expired" };
    }
  });

  if (Object.keys(updates).length > 0) {
    await db.ref("inventoryCandidates").update(updates);
  }
}

const SUGGEST_SYSTEM_PROMPT =
`あなたは家族向けの献立提案アシスタントです。
渡された情報をもとに、主菜3品・副菜6品・汁物3品、
合計12品の候補をプールとして提案してください。
固定の組み合わせ（セット）を作る必要はありません。
それぞれの品目は独立した候補として扱ってください。
ユーザーはこの中から自由に選びます。

# 食材の扱いについて
- inventoryCandidates は、家にまだ残っている可能性がある食材候補です。
- uses には、inventoryCandidates の中から、その品目で使う食材を入れてください。
- buy には、新たに用意する必要がある食材を入れてください。
- 肉・魚介類は、inventoryCandidates に明示されていない限り、基本的に buy 側に分類してください。
- 保存期限が近い野菜や、分割消費されやすい野菜は、できるだけ優先して使ってください。
- inventoryCandidates に無い食材を使う場合は、必ず buy 側に分類してください。

# 過去の実績データについて
- dishPoolStats が提供された場合、選ばれやすい／選ばれにくい献立の傾向を考慮してください。
- memberReception（子供の反応）が含まれる場合は、それを最優先の判断材料としてください。
- poor が多い献立は避け、great が多い献立は積極的に再提案して構いません。
- latestCookingNote がある場合は、同じ品目または近い品目を提案するときの参考にしてください。
- recentDishes とはなるべく異なる献立を提案し、マンネリを避けてください。
- 献立名（dishKey）は、意味的に過去の献立と同じであれば、過去の dishKey をそのまま再利用してください。
- 主菜3品・副菜6品・汁物3品はそれぞれ、なるべく違う系統（和食/洋食/中華、使う食材の系統など）にばらけさせてください。

# 家族への配慮について
- presentMembers に含まれる子供の年齢（age）に応じて、誤嚥しやすい食材を避ける・辛味を控える等の配慮を自動的に反映してください。
- ironFocus が true の場合、鉄分を多く含む食材（ほうれん草・小松菜・ひじき・あさり・レバー・卵黄・大豆製品等）を積極的に取り入れてください。
- 子供が食べる場合は、食材の大きさ・味の濃さ・辛味・食べやすさにも配慮してください。
- specialRequest が存在する場合は、その日の希望として優先的に反映してください。
- ただし、specialRequest が安全性や子供への配慮と矛盾する場合は、安全性・年齢配慮を優先してください。
- 栄養バランスは厳密に計算する必要はありません。気になる場合は一言程度の軽いコメントに留めてください。

# 作り方の手順について
- 手順（steps）は生成しないでください。
- レシピは別の仕組み（実在するレシピサイトへの検索リンク、または保存済み調理メモ）で提示するため、あなたは献立名と使用食材の提案に専念してください。

# 出力形式
必ず以下のJSON形式のみで返してください。
マークダウンやコードブロック、説明文は一切不要です。

{
  "主菜": [
    { "dishKey": "料理名", "uses": ["食材名"], "buy": ["食材名 目安量"] }
  ],
  "副菜": [
    { "dishKey": "料理名", "uses": [], "buy": [] }
  ],
  "汁物": [
    { "dishKey": "料理名", "uses": [], "buy": [] }
  ]
}

主菜は3件、副菜は6件、汁物は3件、必ずこの件数ちょうどで返してください。`;

  );
}
function Modal({ onClose, children }) {
  return (
    <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal-sheet" style={{position:"relative"}}>
        <button className="close-x" onClick={onClose}>×</button>
        {children}
      </div>
    </div>
  );
}
function Spinner({ label }) {
  return <div className="center-msg"><div className="spinner"></div>{label && <p>{label}</p>}</div>;
}

/* ============================================================
   レシピダイアログ（5.13 / 5.14）
   ============================================================ */
function RecipeDialog({ dishKey, dishPool, onClose }) {
  const [open, setOpen] = React.useState(false);
  const [url, setUrl] = React.useState("");
  const [memo, setMemo] = React.useState("");
  const [saving, setSaving] = React.useState(false);
  const [error, setError] = React.useState("");

  const entry = (dishPool || {})[sanitizeKey(dishKey)];
  const cookLog = (entry && entry.cookLog) || [];
  const latest = cookLog.length ? cookLog[cookLog.length - 1] : null;

  async function handlePaste() {
    try {
      const text = await navigator.clipboard.readText();
      if (text) setUrl(text);
    } catch (e) {
      // 読み取り失敗時は静かにフォーカスするだけ
    }
  }

  async function handleSave() {
    if (!url && !memo) { onClose(); return; }
    setSaving(true);
    setError("");
    try {
      let cookingNote = memo;
      let extractionStatus = "manual_only";
      if (memo && memo.trim().length > 0) {
        try {
          const { text } = await callClaude(COOKNOTE_SYSTEM_PROMPT,
            JSON.stringify({ url: url || null, userMemo: memo }), 400);
          const parsed = parseJsonLoose(text);
          if (parsed && parsed.cookingNote) cookingNote = parsed.cookingNote;
        } catch (e) {
          // AI整形に失敗してもユーザーメモをそのまま保存する
        }
      }
      const db = getDb();
      const key = sanitizeKey(dishKey);
      const ref = db.ref("dishPool/" + key);
      const snap = await ref.get();
      const cur = snap.val() || { dishKey, presentedCount: 0, chosenCount: 0, memberReception: {}, cookLog: [] };
      const newLog = [...(cur.cookLog || []), {
        date: todayStr(), url: url || "", userMemo: memo || "", cookingNote: cookingNote || "", extractionStatus
      }].slice(-10);
      await ref.update({ dishKey, cookLog: newLog });
      onClose();
    } catch (e) {
      setError("保存に失敗しました。もう一度お試しください。");
    } finally {
      setSaving(false);
    }
  }

  return (
    <Modal onClose={onClose}>
      <h2>{dishKey}</h2>
      <p className="muted">レシピを探す</p>
      <div className="row" style={{marginBottom:10}}>
        {RECIPE_SITE_TEMPLATES.map(site => (
          <a key={site.name} className="btn btn-outline btn-sm" target="_blank" rel="noopener noreferrer"
             href={site.urlTemplate(dishKey)}>{site.name}で検索</a>
        ))}
      </div>
      {latest && (
        <div className="card" style={{background:"#fdf7ee"}}>
          <h3>前回の調理メモ（{latest.date}）</h3>
          <p style={{fontSize:14}}>{latest.cookingNote || latest.userMemo || "（メモなし）"}</p>
        </div>
      )}
      <div style={{marginTop:14}}>
        <button className="btn btn-outline btn-sm" onClick={() => setOpen(!open)}>
          {open ? "閉じる ▲" : "採用したURL・メモを残す ▼"}
        </button>
      </div>
      {open && (
        <div style={{marginTop:10}}>
          <label className="field-label">見つけたレシピのURL</label>
          <div className="row">
            <input type="url" value={url} onChange={e => setUrl(e.target.value)} placeholder="https://..." style={{flex:1}}/>
            <button className="btn btn-outline btn-sm" onClick={handlePaste}>貼り付け</button>
          </div>
          <label className="field-label">メモ（感想・次回の改善案など）</label>
          <textarea value={memo} onChange={e => setMemo(e.target.value)} placeholder="醤油少し濃かった、次回半分に…"></textarea>
          {error && <p style={{color:"var(--danger)",fontSize:13}}>{error}</p>}
          <button className="btn btn-primary btn-block" style={{marginTop:10}} onClick={handleSave} disabled={saving}>
            {saving ? "保存中…" : "保存する"}
          </button>
        </div>
      )}
    </Modal>
  );
}

/* ============================================================
   在庫確認ワンクッション（5.4）
   ============================================================ */
function InventoryCheckStep({ inventoryCandidates, onDone }) {
  const today = todayStr();
  const activeItems = Object.entries(inventoryCandidates || {})
    .filter(([, v]) => v.status === "active")
    .sort((a, b) => (a[1].estimatedExpireDate || "").localeCompare(b[1].estimatedExpireDate || ""))
    .slice(0, 8);

  const [checked, setChecked] = React.useState(() => {
    const init = {};
    activeItems.forEach(([k]) => init[k] = true);
    return init;
  });
  const [newItem, setNewItem] = React.useState("");
  const [manualAdds, setManualAdds] = React.useState([]);
  const [saving, setSaving] = React.useState(false);

  function addManual() {
    const name = newItem.trim();
    if (!name) return;
    setManualAdds([...manualAdds, name]);
    setNewItem("");
  }

  async function handleNext() {
    setSaving(true);
    const db = getDb();
    const updates = {};
    activeItems.forEach(([key, item]) => {
      if (!checked[key]) {
        updates[key] = { ...item, status: "removed" };
      }
    });
    manualAdds.forEach(name => {
      const key = sanitizeKey(name);
      updates[key] = {
        name, normalizedName: name, category: "other", source: "manual",
        firstSeenDate: today, lastConfirmedDate: today,
        estimatedExpireDate: addDaysStr(today, 14), status: "active",
        memo: "在庫確認フェーズで手動追加"
      };
    });
    if (Object.keys(updates).length > 0) {
      await db.ref("inventoryCandidates").update(updates);
    }
    setSaving(false);
    onDone();
  }

  return (
    <div className="card">
      <h2>そろそろ使ってあげたい食材</h2>
      <p className="muted">まだあるものはチェックしたまま、もう無いものは外してください。</p>
      {activeItems.length === 0 && <p className="muted">気になる食材は特にありません。</p>}
      {activeItems.map(([key, item]) => (
        <div key={key} className="row" style={{justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--line)"}}>
          <div>
            <div style={{fontWeight:600}}>{item.name}</div>
            <div className="muted" style={{fontSize:12}}>
              {CATEGORY_LABEL[item.category] || item.category}
              {item.estimatedExpireDate && ` ・目安 ${item.estimatedExpireDate} まで`}
            </div>
          </div>
          <Toggle on={!!checked[key]} onChange={v => setChecked({ ...checked, [key]: v })} />
        </div>
      ))}
      <label className="field-label">今日使いたい在庫を追加</label>
      <div className="row">
        <input type="text" value={newItem} onChange={e => setNewItem(e.target.value)}
               placeholder="例：冷凍うどん" style={{flex:1}} onKeyDown={e => { if (e.key === "Enter") addManual(); }} />
        <button className="btn btn-outline btn-sm" onClick={addManual}>追加</button>
      </div>
      {manualAdds.length > 0 && (
        <div className="row" style={{marginTop:8}}>
          {manualAdds.map((n,i) => <span key={i} className="chip selected-green">{n}</span>)}
        </div>
      )}
      <button className="btn btn-primary btn-block" style={{marginTop:16}} onClick={handleNext} disabled={saving}>
        {saving ? "反映中…" : "この内容で提案へ進む"}
      </button>
    </div>
  );
}

/* ============================================================
   AI候補プールからの選択（5.7）
   ============================================================ */
function CandidateSelectStep({ pool, onConfirm, onSkip, submitting }) {
  const [selected, setSelected] = React.useState({ "主菜": [], "副菜": [], "汁物": [] });

  function toggle(role, dishKey) {
    setSelected(prev => {
      const cur = prev[role];
      const isSel = cur.includes(dishKey);
      let next;
      if (isSel) {
        next = cur.filter(k => k !== dishKey);
      } else {
        if (ROLE_MAX[role] === 1) {
          next = [dishKey];
        } else {
          if (cur.length >= ROLE_MAX[role]) return prev;
          next = [...cur, dishKey];
        }
      }
      return { ...prev, [role]: next };
    });
  }

  const totalSelected = ROLE_LIST.reduce((s, r) => s + selected[r].length, 0);

  return (
    <div>
      {ROLE_LIST.map(role => (
        <div key={role} className="card">
          <span className="section-badge">{role}（最大{ROLE_MAX[role]}品）</span>
          {(pool[role] || []).map(dish => {
            const isSel = selected[role].includes(dish.dishKey);
            return (
              <div key={dish.dishKey} className={"dish-item" + (isSel ? " selected" : "")}
                   onClick={() => toggle(role, dish.dishKey)}>
                <div className="dname">{dish.dishKey}</div>
                {(dish.uses && dish.uses.length > 0) &&
                  <div className="dsub">使う：{dish.uses.join("・")}</div>}
                {(dish.buy && dish.buy.length > 0) &&
                  <div className="dsub">買い足し：{dish.buy.join("・")}</div>}
              </div>
            );
          })}
        </div>
      ))}
      <button className="btn btn-primary btn-block" disabled={totalSelected === 0 || submitting}
              onClick={() => onConfirm(selected)}>
        {submitting ? "記録中…" : `この内容で記録する（${totalSelected}品）`}
      </button>
      <button className="btn btn-outline btn-block" style={{marginTop:8}} disabled={submitting} onClick={onSkip}>
        今日はどれも作らない
      </button>
    </div>
  );
}

/* ============================================================
   買い足しリスト（5.15）— 画面上の一時状態＋localStorage保存
   ============================================================ */
function BuyListCard({ buyList, setBuyList }) {
  const [newItem, setNewItem] = React.useState("");
  function toggleItem(id) {
    setBuyList(buyList.map(b => b.id === id ? { ...b, checked: !b.checked } : b));
  }
  function addItem() {
    const name = newItem.trim();
    if (!name) return;
    setBuyList([...buyList, { id: uid(), name, checked: false }]);
    setNewItem("");
  }
  function removeItem(id) {
    setBuyList(buyList.filter(b => b.id !== id));
  }
  if (buyList.length === 0) return null;
  return (
    <div className="card">
      <h2>今日買うものメモ</h2>
      {buyList.map(item => (
        <div key={item.id} className={"buy-item" + (item.checked ? " checked" : "")}>
          <input type="checkbox" checked={item.checked} onChange={() => toggleItem(item.id)} />
          <span style={{flex:1}}>{item.name}</span>
          <button className="btn btn-sm btn-outline" onClick={() => removeItem(item.id)}>削除</button>
        </div>
      ))}
      <div className="row" style={{marginTop:10}}>
        <input type="text" value={newItem} onChange={e => setNewItem(e.target.value)}
               placeholder="牛乳、パンなど自由に追加" style={{flex:1}}
               onKeyDown={e => { if (e.key === "Enter") addItem(); }} />
        <button className="btn btn-outline btn-sm" onClick={addItem}>追加</button>
      </div>
    </div>
  );
}

/* ============================================================
   提案タブ本体
   ============================================================ */
function SuggestTab({ familyMembers, dishPool, inventoryCandidates, mealSets, buyList, setBuyList }) {
  const [step, setStep] = React.useState("condition"); // condition -> inventory -> loading -> select -> result
  const [mealType, setMealType] = React.useState("dinner");
  const [presentMembers, setPresentMembers] = React.useState(() => familyMembers.map(m => m.id));
  const [ironFocus, setIronFocus] = React.useState(false);
  const [specialRequest, setSpecialRequest] = React.useState("");
  const [pool, setPool] = React.useState(null);
  const [roundId, setRoundId] = React.useState(null);
  const [error, setError] = React.useState("");
  const [submitting, setSubmitting] = React.useState(false);
  const [confirmedDishes, setConfirmedDishes] = React.useState(null);
  const [recipeDish, setRecipeDish] = React.useState(null);
  const [showManual, setShowManual] = React.useState(false);

  React.useEffect(() => {
    setPresentMembers(familyMembers.map(m => m.id));
  }, [familyMembers.length]);

  function toggleMember(id) {
    setPresentMembers(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  }

  async function startFlow() {
    setError("");
    setStep("syncing");
    try {
      const db = getDb();
      const entriesSnap = await db.ref("entries").get();
      await syncInventoryFromKakeibo(entriesSnap.val() || {}, inventoryCandidates);
      const invSnap = await db.ref("inventoryCandidates").get();
      const freshInventory = invSnap.val() || {};
      const activeCount = Object.values(freshInventory).filter(v => v.status === "active").length;
      if (activeCount === 0) {
        await generatePool(freshInventory);
      } else {
        setStep("inventory");
        window.__freshInventory = freshInventory; // 一時的に保持
      }
    } catch (e) {
      console.error(e);
      setError("在庫情報の取得に失敗しました。通信環境をご確認ください。");
      setStep("condition");
    }
  }

  async function generatePool(freshInventoryOverride) {
    setStep("loading");
    setError("");
    try {
      const db = getDb();
      const today = todayStr();
      const invSnap = freshInventoryOverride ? { val: () => freshInventoryOverride } : await db.ref("inventoryCandidates").get();
      const inv = invSnap.val() || {};
      const activeInv = Object.values(inv).filter(v => v.status === "active").map(v => ({
        name: v.name, category: v.category,
        daysSinceFirstSeen: daysBetween(v.firstSeenDate, today),
        daysUntilExpire: v.estimatedExpireDate ? daysBetween(today, v.estimatedExpireDate) : null
      }));

      const dishPoolStats = Object.values(dishPool || {})
        .filter(d => (d.presentedCount || 0) > 0)
        .sort((a, b) => (b.presentedCount || 0) - (a.presentedCount || 0))
        .slice(0, 20)
        .map(d => {
          const latest = (d.cookLog && d.cookLog.length) ? d.cookLog[d.cookLog.length - 1] : null;
          const o = {
            dishKey: d.dishKey, chosenCount: d.chosenCount || 0, presentedCount: d.presentedCount || 0
          };
          if (d.memberReception) o.memberReception = d.memberReception;
          if (latest && latest.cookingNote) o.latestCookingNote = latest.cookingNote;
          return o;
        });

      const cutoff = addDaysStr(today, -4);
      const recentDishes = Array.from(new Set(
        Object.values(mealSets || {})
          .filter(m => m.date >= cutoff)
          .flatMap(m => (m.dishes || []).map(d => d.dishKey))
      ));

      const presentMemberObjs = familyMembers.filter(m => presentMembers.includes(m.id)).map(m => {
        const o = { id: m.id, name: m.name, type: m.type };
        if (m.type === "child") o.age = computeAge(m.birthdate);
        return o;
      });

      const payload = {
        mealType, presentMembers: presentMemberObjs, ironFocus,
        inventoryCandidates: activeInv, dishPoolStats, recentDishes
      };
      if (specialRequest.trim()) payload.specialRequest = specialRequest.trim();

      const { text } = await callClaude(SUGGEST_SYSTEM_PROMPT, JSON.stringify(payload), 2200);
      const parsed = parseJsonLoose(text);
      if (!parsed["主菜"] || !parsed["副菜"] || !parsed["汁物"]) throw new Error("形式不正");

      const roundRef = db.ref("suggestionRounds").push();
      const roundData = {
        date: today, mealType, presentMembers, ironFocus,
        presented: {
          "主菜": parsed["主菜"].map(d => d.dishKey),
          "副菜": parsed["副菜"].map(d => d.dishKey),
          "汁物": parsed["汁物"].map(d => d.dishKey)
        },
        chosen: { "主菜": [], "副菜": [], "汁物": [] },
        skipped: false
      };
      if (specialRequest.trim()) roundData.specialRequest = specialRequest.trim();
      await roundRef.set(roundData);

      setRoundId(roundRef.key);
      setPool(parsed);
      setStep("select");
    } catch (e) {
      console.error(e);
      setError("献立の提案に失敗しました。もう一度お試しください。");
      setStep("condition");
    }
  }

  async function handleConfirm(selected) {
    setSubmitting(true);
    setError("");
    try {
      const db = getDb();
      const today = todayStr();
      const allDishesFlat = [];
      ROLE_LIST.forEach(role => (pool[role] || []).forEach(d => allDishesFlat.push({ ...d, role })));

      const selectedDishes = [];
      ROLE_LIST.forEach(role => {
        selected[role].forEach(dishKey => {
          const found = (pool[role] || []).find(d => d.dishKey === dishKey);
          if (found) selectedDishes.push({ ...found, role });
        });
      });

      // mealSets
      const mealSetData = {
        date: today, mealType, source: "ai_suggestion", suggestionRoundId: roundId,
        presentMembers, ironFocus,
        dishes: selectedDishes.map(d => ({ dishKey: d.dishKey, role: d.role, uses: d.uses || [], buy: d.buy || [], reactions: {} }))
      };
      if (specialRequest.trim()) mealSetData.specialRequest = specialRequest.trim();
      await db.ref("mealSets").push(mealSetData);

      // suggestionRounds.chosen
      await db.ref("suggestionRounds/" + roundId + "/chosen").set({
        "主菜": selected["主菜"], "副菜": selected["副菜"], "汁物": selected["汁物"]
      });

      // dishPool 更新（presentedCount は全12品、chosenCountは選択品目のみ）
      const dishPoolUpdates = {};
      const selectedKeys = new Set(selectedDishes.map(d => d.dishKey));
      allDishesFlat.forEach(d => {
        const key = sanitizeKey(d.dishKey);
        const cur = (dishPool || {})[key] || { dishKey: d.dishKey, presentedCount: 0, chosenCount: 0, memberReception: {}, cookLog: [] };
        const next = { ...cur, dishKey: d.dishKey, presentedCount: (cur.presentedCount || 0) + 1 };
        if (selectedKeys.has(d.dishKey)) {
          next.chosenCount = (cur.chosenCount || 0) + 1;
          next.lastCookedDate = today;
        }
        dishPoolUpdates[key] = next;
      });
      await db.ref("dishPool").update(dishPoolUpdates);

      // inventoryCandidates：使った食材を消費済みとして扱う（簡易ルール）
      const usedNames = new Set(selectedDishes.flatMap(d => d.uses || []));
      if (usedNames.size > 0) {
        const invSnap = await db.ref("inventoryCandidates").get();
        const inv = invSnap.val() || {};
        const invUpdates = {};
        Object.entries(inv).forEach(([key, item]) => {
          if (item.status === "active" && (usedNames.has(item.name) || usedNames.has(item.normalizedName))) {
            invUpdates[key] = { ...item, status: "removed" };
          }
        });
        if (Object.keys(invUpdates).length > 0) await db.ref("inventoryCandidates").update(invUpdates);
      }

      // 買い足しリスト生成
      const buys = Array.from(new Set(selectedDishes.flatMap(d => d.buy || [])));
      const newBuyList = buys.map(name => ({ id: uid(), name, checked: false }));
      setBuyList(newBuyList);

      setConfirmedDishes(selectedDishes);
      setStep("result");
    } catch (e) {
      console.error(e);
      setError("記録に失敗しました。もう一度お試しください。");
    } finally {
      setSubmitting(false);
    }
  }

  async function handleSkip() {
    setSubmitting(true);
    try {
      const db = getDb();
      await db.ref("suggestionRounds/" + roundId + "/skipped").set(true);
      resetFlow();
    } catch (e) {
      setError("処理に失敗しました。");
    } finally {
      setSubmitting(false);
    }
  }

  function resetFlow() {
    setStep("condition");
    setPool(null);
    setRoundId(null);
    setConfirmedDishes(null);
    setSpecialRequest("");
    setIronFocus(false);
  }

  if (step === "syncing" || step === "loading") {
    return <Spinner label={step === "syncing" ? "在庫を確認しています…" : "献立を考えています…"} />;
  }

  if (step === "inventory") {
    return <InventoryCheckStep inventoryCandidates={window.__freshInventory || inventoryCandidates}
             onDone={() => generatePool(window.__freshInventory)} />;
  }

  if (step === "select" && pool) {
    return (
      <div>
        <CandidateSelectStep pool={pool} submitting={submitting}
          onConfirm={handleConfirm} onSkip={handleSkip} />
        {error && <p style={{color:"var(--danger)"}}>{error}</p>}
      </div>
    );
  }

  if (step === "result" && confirmedDishes) {
    return (
      <div>
        <div className="card">
          <h2>記録しました🍚</h2>
          {confirmedDishes.map(d => (
            <div key={d.dishKey} className="dish-item" onClick={() => setRecipeDish(d.dishKey)}>
              <div className="dname">{d.dishKey}<span className="muted" style={{marginLeft:8,fontWeight:400}}>（{d.role}）</span></div>
              <div className="dsub">タップしてレシピ・調理メモを見る</div>
            </div>
          ))}
        </div>
        <BuyListCard buyList={buyList} setBuyList={setBuyList} />
        <button className="btn btn-outline btn-block" onClick={resetFlow}>もう一度提案する</button>
        {recipeDish && <RecipeDialog dishKey={recipeDish} dishPool={dishPool} onClose={() => setRecipeDish(null)} />}
      </div>
    );
  }

  // condition step
  return (
    <div>
      <div className="card">
        <h2>今日の献立を提案してもらう</h2>
        <label className="field-label">食事のタイミング</label>
        <div className="row">
          {Object.entries(MEAL_TYPE_LABEL).map(([k, label]) => (
            <span key={k} className={"chip" + (mealType === k ? " selected" : "")} onClick={() => setMealType(k)}>{label}</span>
          ))}
        </div>
        <label className="field-label">今夜いるメンバー</label>
        <div className="row">
          {familyMembers.map(m => (
            <span key={m.id} className={"chip" + (presentMembers.includes(m.id) ? " selected" : "")}
                  onClick={() => toggleMember(m.id)}>{m.name}</span>
          ))}
        </div>
        <div style={{marginTop:14}}>
          <Toggle on={ironFocus} onChange={setIronFocus} label="🩸 鉄分強化" />
        </div>
        <label className="field-label">今日の特別オーダー（任意）</label>
        <input type="text" value={specialRequest} onChange={e => setSpecialRequest(e.target.value)}
               placeholder="例：今日は軽め、冷凍うどんを使いたい" />
        {error && <p style={{color:"var(--danger)"}}>{error}</p>}
        <button className="btn btn-primary btn-block" style={{marginTop:16}}
                disabled={presentMembers.length === 0} onClick={startFlow}>
          献立を提案してもらう
        </button>
        <div style={{textAlign:"center",marginTop:10}}>
          <a href="#" className="link-btn" onClick={e => { e.preventDefault(); setShowManual(true); }}>
            AI提案を使わず手入力で記録する

/* ============================================================
   手入力記録画面
   ============================================================ */
function ManualEntryModal({ dishPool, onClose }) {
  const [mealType, setMealType] = React.useState("dinner");
  const [text, setText] = React.useState("");
  const [dishes, setDishes] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [saving, setSaving] = React.useState(false);
  const [error, setError] = React.useState("");

  async function handleSplit() {
    if (!text.trim()) return;
    setLoading(true);
    setError("");
    try {
      const { text: resText } = await callClaude(MANUAL_SPLIT_SYSTEM_PROMPT, text.trim(), 500);
      const parsed = parseJsonLoose(resText);
      setDishes(Array.isArray(parsed) ? parsed : []);
    } catch (e) {
      setError("解析に失敗しました。もう一度お試しください。");
    } finally {
      setLoading(false);
    }
  }

  function changeRole(idx, role) {
    setDishes(dishes.map((d, i) => i === idx ? { ...d, role } : d));
  }

  async function handleSave() {
    setSaving(true);
    setError("");
    try {
      const db = getDb();
      const today = todayStr();
      await db.ref("mealSets").push({
        date: today, mealType, source: "manual",
        dishes: dishes.map(d => ({ dishKey: d.dishKey, role: d.role, uses: [], buy: [], reactions: {} }))
      });
      const updates = {};
      dishes.forEach(d => {
        const key = sanitizeKey(d.dishKey);
        const cur = (dishPool || {})[key] || { dishKey: d.dishKey, presentedCount: 0, chosenCount: 0, memberReception: {}, cookLog: [] };
        updates[key] = { ...cur, dishKey: d.dishKey, chosenCount: (cur.chosenCount || 0) + 1, lastCookedDate: today };
      });
      if (Object.keys(updates).length > 0) await db.ref("dishPool").update(updates);
      onClose();
    } catch (e) {
      setError("保存に失敗しました。");
    } finally {
      setSaving(false);
    }
  }

  return (
    <Modal onClose={onClose}>
      <h2>今日作ったものを記録</h2>
      <label className="field-label">食事のタイミング</label>
      <div className="row">
        {Object.entries(MEAL_TYPE_LABEL).map(([k, label]) => (
          <span key={k} className={"chip" + (mealType === k ? " selected" : "")} onClick={() => setMealType(k)}>{label}</span>
        ))}
      </div>
      {!dishes && (
        <div>
          <label className="field-label">今日作ったもの（自由記述）</label>
          <textarea value={text} onChange={e => setText(e.target.value)} placeholder="例：カレー、サラダ、味噌汁"></textarea>
          {error && <p style={{color:"var(--danger)"}}>{error}</p>}
          <button className="btn btn-primary btn-block" style={{marginTop:10}} disabled={loading} onClick={handleSplit}>
            {loading ? "解析中…" : "品目を確認する"}
          </button>
        </div>
      )}
      {dishes && (
        <div>
          <p className="muted">役割が違う場合はタップで変更できます。</p>
          {dishes.map((d, i) => (
            <div key={i} className="row" style={{alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
              <span style={{fontWeight:600}}>{d.dishKey}</span>
              <div className="row">
                {ROLE_LIST.map(r => (
                  <span key={r} className={"chip" + (d.role === r ? " selected" : "")} onClick={() => changeRole(i, r)}>{r}</span>
                ))}
              </div>
            </div>
          ))}
          {error && <p style={{color:"var(--danger)"}}>{error}</p>}
          <button className="btn btn-primary btn-block" style={{marginTop:10}} disabled={saving} onClick={handleSave}>
            {saving ? "保存中…" : "この内容で記録する"}
          </button>
        </div>
      )}
    </Modal>
  );
}

/* ============================================================
   反応記録（5.12）
   ============================================================ */
async function recordReaction(mealSetId, mealSetData, dishIdx, childId, value) {
  const db = getDb();
  const dish = mealSetData.dishes[dishIdx];
  const prevValue = dish.reactions ? dish.reactions[childId] : null;
  const newValue = prevValue === value ? null : value; // もう一度押すと解除

  const newDishes = mealSetData.dishes.map((d, i) => {
    if (i !== dishIdx) return d;
    const reactions = { ...(d.reactions || {}) };
    if (newValue) reactions[childId] = newValue; else delete reactions[childId];
    return { ...d, reactions };
  });
  await db.ref("mealSets/" + mealSetId + "/dishes").set(newDishes);

  // dishPool.memberReception の集計を更新
  const key = sanitizeKey(dish.dishKey);
  const poolRef = db.ref("dishPool/" + key);
  const snap = await poolRef.get();
  const cur = snap.val() || { dishKey: dish.dishKey, presentedCount: 0, chosenCount: 0, memberReception: {}, cookLog: [] };
  const mr = { ...(cur.memberReception || {}) };
  const childCounts = { great: 0, ok: 0, poor: 0, ...(mr[childId] || {}) };
  if (prevValue && childCounts[prevValue] > 0) childCounts[prevValue] -= 1;
  if (newValue) childCounts[newValue] = (childCounts[newValue] || 0) + 1;
  mr[childId] = childCounts;
  await poolRef.update({ dishKey: dish.dishKey, memberReception: mr });
}

/* ============================================================
   カレンダータブ
   ============================================================ */
function CalendarTab({ mealSets, familyMembers, dishPool }) {
  const [cursor, setCursor] = React.useState(() => { const d = new Date(); return { y: d.getFullYear(), m: d.getMonth() }; });
  const [selectedDate, setSelectedDate] = React.useState(null);

  const first = new Date(cursor.y, cursor.m, 1);
  const startWeekday = first.getDay();
  const daysInMonth = new Date(cursor.y, cursor.m + 1, 0).getDate();

  const entriesByDate = {};
  Object.entries(mealSets || {}).forEach(([id, m]) => {
    if (!m.date) return;
    (entriesByDate[m.date] = entriesByDate[m.date] || []).push([id, m]);
  });

  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  function dateStrFor(d) {
    return `${cursor.y}-${String(cursor.m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  }

  return (
    <div className="card">
      <div className="row" style={{justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <button className="btn btn-sm btn-outline" onClick={() => setCursor(c => c.m === 0 ? { y: c.y-1, m: 11 } : { y: c.y, m: c.m-1 })}>◀</button>
        <h2 style={{margin:0}}>{cursor.y}年{cursor.m+1}月</h2>
        <button className="btn btn-sm btn-outline" onClick={() => setCursor(c => c.m === 11 ? { y: c.y+1, m: 0 } : { y: c.y, m: c.m+1 })}>▶</button>
      </div>
      <div className="calendar-grid" style={{marginBottom:4}}>
        {["日","月","火","水","木","金","土"].map(w => <div key={w} className="muted" style={{fontSize:11}}>{w}</div>)}
      </div>
      <div className="calendar-grid">
        {cells.map((d, i) => {
          if (d === null) return <div key={i} className="cal-cell empty"></div>;
          const ds = dateStrFor(d);
          const dayEntries = entriesByDate[ds] || [];
          const hasAi = dayEntries.some(([, m]) => m.source === "ai_suggestion");
          const hasManual = dayEntries.some(([, m]) => m.source === "manual");
          return (
            <div key={i} className="cal-cell" onClick={() => setSelectedDate(ds)}>
              <span>{d}</span>
              <div className="dots">
                {hasAi && <span className="dot ai"></span>}
                {hasManual && <span className="dot manual"></span>}
              </div>
            </div>
          );
        })}
      </div>
      {selectedDate && (
        <DayDetailModal date={selectedDate} entries={entriesByDate[selectedDate] || []}
          familyMembers={familyMembers} dishPool={dishPool} onClose={() => setSelectedDate(null)} />
      )}
    </div>
  );
}

function FamilyTab({ familyMembers }) {

  function update(idx, patch) {
    setMembers(members.map((m, i) => i === idx ? { ...m, ...patch } : m));

  }
  function addMember() {
    setMembers([...members, { id: "member_" + uid(), name: "", type: "adult" }]);

  function removeMember(idx) {
    setMembers(members.filter((_, i) => i !== idx));
  }
  async function handleSave() {
    setSaving(true);
    try {
      const db = getDb();
      await db.ref("familyProfile/members").set(members);
      setSaved(true);
    } finally {
      setSaving(false);

/* ============================================================
   認証ゲート
   ============================================================ */
function AuthGate({ children }) {
  const [authed, setAuthed] = React.useState(false);
  const [checked, setChecked] = React.useState(false);
  const [input, setInput] = React.useState("");
  const [error, setError] = React.useState("");

  React.useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const urlKey = params.get("key");
    if (urlKey) {
      localStorage.setItem("kondate-auth", urlKey);
    }
    const stored = localStorage.getItem("kondate-auth") || localStorage.getItem("kakeibo-auth");
    if (stored === APP_PASSWORD) setAuthed(true);
    setChecked(true);
  }, []);

  function handleSubmit(e) {
    e.preventDefault();
    if (input === APP_PASSWORD) {
      localStorage.setItem("kondate-auth", input);
      setAuthed(true);
    } else {
      setError("パスワードが違います。");
    }
  }

  if (!checked) return <Spinner />;
  if (!authed) {
    return (
      <div className="container" style={{paddingTop:60}}>
        <div className="card">
          <h2>今日のごはん</h2>
          <p className="muted">パスワードを入力してください</p>
          <form onSubmit={handleSubmit}>
            <input type="password" value={input} onChange={e => setInput(e.target.value)} />
            {error && <p style={{color:"var(--danger)"}}>{error}</p>}
            <button type="submit" className="btn btn-primary btn-block" style={{marginTop:10}}>入る</button>
          </form>
        </div>
      </div>
    );
  }
  return children;
}
