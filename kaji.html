function points(choreId, actor, chores, variantIndex) {
  const c = chores[choreId];
  if (!c) return 0;
  const timeVal = c.variantsEnabled && c.variants && variantIndex != null ? variantIndex + 1 : (c.time || 1);
  return Math.round((timeVal + c.phys + c.mental) * c.coef[actor]);
}

function toArray(obj) {
  if (!obj) return [];
  return Object.entries(obj).map(([id, v]) => ({ id, ...v }));
}

/* ---------- ホーム ---------- */
function Home({ records, chores, cumulative }) {
  const today = records.filter((r) => r.isToday);
  const week = records;
  const sum = (list, actor) => list.reduce((s, r) => (r.actor === actor ? s + points(r.choreId, r.actor, chores, r.variantIndex) : s), 0);

  const todayK = sum(today, "けけ"), todayN = sum(today, "なな");
  const weekK = sum(week, "けけ"), weekN = sum(week, "なな");
  const diff = weekK - weekN;

  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        <Card>
          <div style={{ fontSize: 12, color: C.sub, marginBottom: 8 }}>今日</div>
          <Row label="けけ" value={todayK} color={C.indigo} />
          <Row label="なな" value={todayN} color={C.thanks} />
        </Card>
        <Card>
          <div style={{ fontSize: 12, color: C.sub, marginBottom: 8 }}>今週</div>
          <Row label="けけ" value={weekK} color={C.indigo} />
          <Row label="なな" value={weekN} color={C.thanks} />
        </Card>
      </div>

      <SectionLabel>今週の偏り</SectionLabel>
      <Card>
        <div style={{ fontSize: 13, color: C.ink, marginBottom: 10 }}>
          {diff === 0
            ? "今週はほぼ均等です。"
            : diff > 0
            ? `けけさんの方が ${Math.abs(diff)} ポイントほど多めです。`
            : `ななさんの方が ${Math.abs(diff)} ポイントほど多めです。`}
        </div>
        <Seesaw diff={diff} />
      </Card>

      <SectionLabel>累積バランス</SectionLabel>
      <Card>
        <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 6 }}>
          <span style={{ fontFamily: "'Shippori Mincho', serif", fontSize: 24, color: C.indigo, fontWeight: 700 }}>
            +{cumulative}
          </span>
          <span style={{ fontSize: 12, color: C.sub }}>けけさん側に緩やかに蓄積</span>
        </div>
        <div style={{ fontSize: 11, color: C.sub, lineHeight: 1.6 }}>
          この数値は現在サンプルの固定値です。減衰ロジック（数週かけて薄まる仕組み）は今後の実装予定です。
        </div>
      </Card>
    </div>
  );
}

function Seesaw({ diff }) {
  const clamped = Math.max(-15, Math.min(15, diff));
  const angle = (clamped / 15) * 8;
  return (
    <svg viewBox="0 0 300 90" style={{ width: "100%", height: 70 }}>
      <line x1="150" y1="30" x2="150" y2="70" stroke={C.tan} strokeWidth="4" />
      <g transform={`rotate(${angle} 150 30)`}>
        <line x1="40" y1="30" x2="260" y2="30" stroke={C.indigo} strokeWidth="4" strokeLinecap="round" />
        <circle cx="40" cy="30" r="14" fill={C.indigoSoft} stroke={C.indigo} strokeWidth="1.5" />
        <text x="40" y="34" textAnchor="middle" fontSize="11" fill={C.indigo} fontWeight="500">け</text>
        <circle cx="260" cy="30" r="14" fill={C.thanksSoft} stroke={C.thanks} strokeWidth="1.5" />
        <text x="260" y="34" textAnchor="middle" fontSize="11" fill={C.thanks} fontWeight="500">な</text>
      </g>
    </svg>
  );
}

/* ---------- 記録 ---------- */
function RecordCard({ record, chores, viewer, stampPresets, onStamp, openStampFor, setOpenStampFor }) {
  const canThank = record.actor !== viewer && !record.thanks;
  const alreadyThanked = !!record.thanks;
  const isOpen = openStampFor === record.id;
  const pts = points(record.choreId, record.actor, chores, record.variantIndex);
  const chore = chores[record.choreId];
  if (!chore) return null;
  const variantLabel = chore.variantsEnabled && chore.variants && record.variantIndex != null
    ? chore.variants[record.variantIndex].label
    : null;
  const myPresets = stampPresets[viewer] || DEFAULT_STAMP_PRESETS[viewer];

  return (
    <Card style={{ marginBottom: 10, padding: "14px 16px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
        <Avatar name={record.actor} />
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 15, color: C.ink, fontWeight: 500 }}>
            {chore.name}{variantLabel ? <span style={{ color: C.sub, fontWeight: 400 }}>（{variantLabel}）</span> : null}
          </div>
          <div style={{ fontSize: 12, color: C.sub, marginTop: 2 }}>
            {record.day}曜 {record.time} ・ {record.actor} ・ {pts}pt
          </div>
        </div>
        {alreadyThanked ? (
          <Fusen text={record.thanks.text} />
        ) : canThank ? (
          <button
            onClick={() => setOpenStampFor(isOpen ? null : record.id)}
            style={{
              border: `1px solid ${C.thanks}66`, background: isOpen ? C.thanksSoft : "transparent",
              color: C.thanks, borderRadius: 999, padding: "6px 12px", fontSize: 12,
              fontFamily: "'Zen Kaku Gothic New', sans-serif", cursor: "pointer", flexShrink: 0,
            }}
          >
            お礼を押す
          </button>
        ) : <div style={{ width: 26 }} />}
      </div>

      {isOpen && (
        <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${C.tan}44`, display: "flex", gap: 8 }}>
          {myPresets.map((text, i) => (
            <button key={i} onClick={() => onStamp(record.id, text)}
              style={{
                flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 6,
                padding: "10px 4px", borderRadius: 10, border: `1px solid ${C.thanks}33`,
                background: C.surface, cursor: "pointer",
              }}>
              <Fusen text={text} />
            </button>
          ))}
        </div>
      )}
    </Card>
  );
}

function AddRecordModal({ open, chores, choreOrder, onClose, onConfirm }) {
  const [step, setStep] = useState("chore");
  const [choreId, setChoreId] = useState(null);

  if (!open) return null;

  const chore = choreId ? chores[choreId] : null;
  const close = () => { onClose(); setStep("chore"); setChoreId(null); };
  const pickChore = (id) => {
    const c = chores[id];
    if (c.variantsEnabled && c.variants) {
      setChoreId(id);
      setStep("variant");
    } else {
      onConfirm(id, null);
      close();
    }
  };

  return (
    <div style={{
      position: "fixed", inset: 0, background: "rgba(46,43,38,0.4)",
      display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 10,
    }}>
      <div style={{ background: C.surface, borderRadius: "16px 16px 0 0", padding: 20, maxWidth: 420, width: "100%", maxHeight: "70vh", overflowY: "auto", boxSizing: "border-box" }}>
        {step === "chore" ? (
          <>
            <div style={{ fontSize: 14, fontWeight: 500, color: C.ink, marginBottom: 12 }}>何をした？</div>
            {choreOrder.map((id) => chores[id] ? (
              <button key={id} onClick={() => pickChore(id)} style={{
                width: "100%", textAlign: "left", padding: "12px 14px", borderRadius: 10, marginBottom: 6,
                border: `1px solid ${C.tan}55`, background: "transparent", color: C.ink, fontSize: 13, cursor: "pointer",
              }}>
                {chores[id].name}
              </button>
            ) : null)}
            <button onClick={close} style={{
              width: "100%", marginTop: 4, padding: "9px 0", borderRadius: 9, border: "none",
              background: "transparent", color: C.sub, fontSize: 12, cursor: "pointer",
            }}>キャンセル</button>
          </>
        ) : (
          <>
            <div style={{ fontSize: 14, fontWeight: 500, color: C.ink, marginBottom: 4 }}>{chore.name}</div>
            <div style={{ fontSize: 11, color: C.sub, marginBottom: 12 }}>どれくらいの量だった？</div>
            {chore.variants.map((v, i) => (
              <button key={i} onClick={() => { onConfirm(choreId, i); close(); }} style={{
                width: "100%", display: "flex", justifyContent: "space-between", alignItems: "center",
                padding: "12px 14px", borderRadius: 10, marginBottom: 6,
                border: `1px solid ${C.tan}55`, background: "transparent", color: C.ink, fontSize: 13, cursor: "pointer",
              }}>
                <span>{v.label}</span>
                <span style={{ color: C.sub, fontSize: 11 }}>目安 約{v.minutes}分</span>
              </button>
            ))}
            <button onClick={() => setStep("chore")} style={{
              width: "100%", marginTop: 4, padding: "9px 0", borderRadius: 9, border: `1px solid ${C.tan}88`,
              background: "transparent", color: C.sub, fontSize: 12, cursor: "pointer",
            }}>戻る</button>
          </>
        )}
      </div>
    </div>
  );
}

}

/* ---------- レポート ---------- */
function RankBar({ label, value, max, color }) {
  return (
    <div style={{ marginBottom: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 3 }}>
        <span style={{ color: C.ink }}>{label}</span>
        <span style={{ color: C.sub }}>{value}pt</span>
      </div>
      <div style={{ height: 7, background: `${color}20`, borderRadius: 999 }}>
        <div style={{ width: `${max > 0 ? (value / max) * 100 : 0}%`, height: "100%", background: color, borderRadius: 999 }} />
      </div>
    </div>
  );
}

function Sparkline({ data }) {
  const w = 280, h = 110, pad = 20;
  const maxV = Math.max(...data.flatMap((d) => [d.けけ, d.なな])) + 3;
  const x = (i) => pad + (i * (w - pad * 2)) / (data.length - 1);
  const y = (v) => h - pad - (v / maxV) * (h - pad * 2);
  const line = (key) => data.map((d, i) => `${i === 0 ? "M" : "L"}${x(i)},${y(d[key])}`).join(" ");
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: "100%", height: 130 }}>
      <path d={line("けけ")} fill="none" stroke={C.indigo} strokeWidth="2" />
      <path d={line("なな")} fill="none" stroke={C.thanks} strokeWidth="2" />
      {data.map((d, i) => (
        <g key={i}>
          <circle cx={x(i)} cy={y(d.けけ)} r="3" fill={C.indigo} />
          <circle cx={x(i)} cy={y(d.なな)} r="3" fill={C.thanks} />
          <text x={x(i)} y={h - 2} fontSize="9" fill={C.sub} textAnchor="middle">{d.label}</text>
        </g>
      ))}
    </svg>
  );
}

function Report({ records, chores }) {
  const byChore = {};
  records.forEach((r) => {
    if (!chores[r.choreId]) return;
    byChore[r.choreId] = (byChore[r.choreId] || 0) + points(r.choreId, r.actor, chores, r.variantIndex);
  });
  const ranking = Object.entries(byChore).sort((a, b) => b[1] - a[1]);
  const maxPt = ranking.length ? Math.max(...ranking.map((r) => r[1])) : 1;

  const physRank = Object.entries(chores).sort((a, b) => b[1].phys - a[1].phys).slice(0, 3);
  const mentalRank = Object.entries(chores).sort((a, b) => b[1].mental - a[1].mental).slice(0, 3);

  const minuteRecords = records.filter((r) => {
    const c = chores[r.choreId];
    return c && c.variantsEnabled && c.variants && r.variantIndex != null;
  });

  return (
    <div>
      <SectionLabel>今週の家事別ポイント</SectionLabel>
      <Card>
        {ranking.length === 0 && <div style={{ fontSize: 12, color: C.sub }}>まだ記録がありません。</div>}
        {ranking.map(([id, v]) => (
          <RankBar key={id} label={chores[id].name} value={v} max={maxPt} color={C.indigo} />
        ))}
      </Card>

      <SectionLabel>身体負荷が高い家事</SectionLabel>
      <Card>
        {physRank.map(([id, c]) => (

/* ---------- 週次レビュー ---------- */
function BalanceBar({ label, given, received, color }) {
  const maxVal = 6;
  const pct = (v) => Math.min(100, (v / maxVal) * 100);
  return (
    <div style={{ marginBottom: 12 }}>
      <div style={{ fontSize: 13, color: C.ink, fontWeight: 500, marginBottom: 6 }}>{label}</div>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
        <span style={{ fontSize: 11, color: C.sub, width: 50 }}>渡した</span>
        <div style={{ flex: 1, height: 8, background: `${color}22`, borderRadius: 999 }}>
          <div style={{ width: `${pct(given)}%`, height: "100%", background: color, borderRadius: 999 }} />
        </div>
        <span style={{ fontSize: 11, color: C.sub, width: 16, textAlign: "right" }}>{given}</span>
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <span style={{ fontSize: 11, color: C.sub, width: 50 }}>もらった</span>
        <div style={{ flex: 1, height: 8, background: `${color}22`, borderRadius: 999 }}>
          <div style={{ width: `${pct(received)}%`, height: "100%", background: color, opacity: 0.55, borderRadius: 999 }} />
        </div>
        <span style={{ fontSize: 11, color: C.sub, width: 16, textAlign: "right" }}>{received}</span>
      </div>
    </div>
  );
}

function WeeklyReview({ records, chores, cumulative }) {
  const [memo, setMemo] = useState("");
  const [agreed, setAgreed] = useState(false);

  const sum = (actor) => records.reduce((s, r) => (r.actor === actor ? s + points(r.choreId, r.actor, chores, r.variantIndex) : s), 0);
  const weekK = sum("けけ"), weekN = sum("なな");
  const diff = weekK - weekN;

  const counts = { けけ: { given: 0, received: 0 }, なな: { given: 0, received: 0 } };
  records.forEach((r) => {
    if (r.thanks) {
      counts[r.thanks.from].given += 1;
      counts[r.actor].received += 1;
    }
  });
  const thanked = records.filter((r) => !!r.thanks);

  return (
    <div>
      <SectionLabel>今週のまとめ</SectionLabel>
      <Card>
        <div style={{ fontSize: 13, color: C.ink, marginBottom: 8 }}>
          けけ {weekK}pt ・ なな {weekN}pt
        </div>
        <div style={{ fontSize: 12, color: C.sub }}>
          {diff === 0 ? "ほぼ均等な一週間でした。" : `${diff > 0 ? "けけ" : "なな"}さん側に ${Math.abs(diff)}pt ほど偏りました。累積は現在 +${cumulative}（けけ側）です。`}
        </div>
      </Card>

      <SectionLabel>今週のありがとう</SectionLabel>
      <Card>
        <BalanceBar label="けけ" given={counts["けけ"].given} received={counts["けけ"].received} color={C.indigo} />
        <BalanceBar label="なな" given={counts["なな"].given} received={counts["なな"].received} color={C.thanks} />
        <div style={{ borderTop: `1px solid ${C.tan}33`, paddingTop: 10 }}>
          {thanked.length === 0 && <div style={{ fontSize: 12, color: C.sub }}>まだお礼はありません。</div>}
          {thanked.map((r) => chores[r.choreId] ? (
            <div key={r.id} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
              <Fusen text={r.thanks.text} />
              <div style={{ fontSize: 12, color: C.ink }}>
                {chores[r.choreId].name}
                <span style={{ color: C.sub }}>（{r.actor}に{r.thanks.from}より）</span>
              </div>
            </div>
          ) : null)}
        </div>
      </Card>

      <SectionLabel>来週の調整メモ</SectionLabel>
      <Card>
        <textarea
          value={memo}
          onChange={(e) => setMemo(e.target.value)}
          placeholder="例：来週は夕食づくりをけけさん多めに、送りをななさん多めに調整する"
          style={{
            width: "100%", minHeight: 70, border: `1px solid ${C.tan}66`, borderRadius: 8,
            padding: 10, fontSize: 13, fontFamily: "'Zen Kaku Gothic New', sans-serif",
            color: C.ink, resize: "vertical", boxSizing: "border-box", background: "#fff",
          }}
        />
        <button
          onClick={() => setAgreed(true)}
          disabled={agreed}
          style={{
            marginTop: 10, width: "100%", padding: "10px 0", borderRadius: 10, border: "none",
            background: agreed ? C.indigoSoft : C.indigo, color: agreed ? C.indigo : "#fff",
            fontSize: 13, cursor: agreed ? "default" : "pointer",
          }}
        >
          {agreed ? "合意しました" : "二人で合意して確定する"}
        </button>
      </Card>
    </div>
  );
}

/* ---------- マスタ ---------- */
function Stepper({ value, onChange, min = 1, max = 3 }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
      <button
        onClick={() => onChange(Math.max(min, value - 1))}
        style={{ width: 26, height: 26, borderRadius: 8, border: `1px solid ${C.tan}88`, background: C.surface, color: C.ink, cursor: "pointer", fontSize: 14 }}
      >−</button>
      <span style={{ fontSize: 13, color: C.ink, width: 14, textAlign: "center" }}>{value}</span>
      <button
        onClick={() => onChange(Math.min(max, value + 1))}
        style={{ width: 26, height: 26, borderRadius: 8, border: `1px solid ${C.tan}88`, background: C.surface, color: C.ink, cursor: "pointer", fontSize: 14 }}
      >＋</button>
    </div>
  );
}

function CoefPicker({ actor, value, color, onRequestChange }) {
  return (
    <div>
      <div style={{ fontSize: 11, color: C.sub, marginBottom: 4 }}>{actor}の係数</div>
      <div style={{ display: "flex", gap: 4 }}>
        {COEF_OPTIONS.map((opt) => (
          <button
            key={opt}
            onClick={() => opt !== value && onRequestChange(opt)}
            style={{
              flex: 1, padding: "5px 0", borderRadius: 7, fontSize: 11,
              border: `1px solid ${opt === value ? color : C.tan + "55"}`,
              background: opt === value ? color : "transparent",

  );

function VariantEditor({ choreId, variants, onUpdateStat }) {
  const updateVariant = (idx, field, value) => {

  return (
    <div style={{ marginBottom: 12 }}>
      <div style={{ fontSize: 11, color: C.sub, marginBottom: 6 }}>
        量のバリエーション（少量=1点 ・ 中量=2点 ・ 大量=3点として計算されます）

      {variants.map((v, i) => (
        <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
          <input
            value={v.label}
            onChange={(e) => updateVariant(i, "label", e.target.value)}
            style={{
              flex: 1, border: `1px solid ${C.tan}66`, borderRadius: 7, padding: "5px 8px",
              fontSize: 12, fontFamily: "'Zen Kaku Gothic New', sans-serif", color: C.ink,
              boxSizing: "border-box", background: "#fff",

      </div>
      <AddChoreForm onAdd={onAddChore} />
      <StampPresetEditor stampPresets={stampPresets} onUpdatePreset={onUpdatePreset} />
      {choreOrder.map((id, i) => chores[id] ? (
        <ChoreEditCard
          key={id}
          choreId={id}
          chore={chores[id]}
          onUpdateStat={onUpdateStat}
          onRequestCoefChange={requestCoefChange}
          history={history}
          showHistory={openHistoryId === id}
          onToggleHistory={(cid) => setOpenHistoryId(openHistoryId === cid ? null : cid)}
          onMoveUp={() => onMoveChore(id, -1)}
          onMoveDown={() => onMoveChore(id, 1)}
          canMoveUp={i > 0}
          canMoveDown={i < choreOrder.length - 1}
          onRequestDelete={() => requestDelete(id)}
        />
      ) : null)}
      <CoefChangeModal pending={pending} onCancel={() => setPending(null)} onConfirm={confirmChange} />
      <DeleteChoreModal request={deleteRequest} onCancel={() => setDeleteRequest(null)} onConfirm={confirmDelete} />
    </div>
  );
}

/* ---------- App（Firebase連携） ---------- */
function App() {
  const [viewer, setViewer] = useState("なな");
  const [tab, setTab] = useState("home");
  const [ready, setReady] = useState(false);

  const [chores, setChores] = useState(null);
  const [choreOrder, setChoreOrder] = useState(null);
  const [records, setRecords] = useState(null);
  const [history, setHistory] = useState(null);
  const [stampPresets, setStampPresets] = useState(null);
  const [cumulative, setCumulative] = useState(18);

  const [openStampFor, setOpenStampFor] = useState(null);

  // 初回のみ：データが無ければ初期値を書き込む
  useEffect(() => {
    db.ref("kaji").once("value").then((snap) => {
      if (!snap.exists()) {
        db.ref("kaji").set({
          chores: DEFAULT_CHORES,
          choreOrder: DEFAULT_CHORE_ORDER,
          records: DEFAULT_RECORDS,
          history: DEFAULT_HISTORY,
          stampPresets: DEFAULT_STAMP_PRESETS,
          cumulative: 18,
        });
      }
      setReady(true);
    });
  }, []);

  // リアルタイム購読
  useEffect(() => {
    if (!ready) return;
    const refs = {
      chores: db.ref("kaji/chores"),
      choreOrder: db.ref("kaji/choreOrder"),
      records: db.ref("kaji/records"),
      history: db.ref("kaji/history"),
      stampPresets: db.ref("kaji/stampPresets"),
      cumulative: db.ref("kaji/cumulative"),
    };
    refs.chores.on("value", (s) => setChores(s.val() || {}));
    refs.choreOrder.on("value", (s) => setChoreOrder(s.val() || []));
    refs.records.on("value", (s) => setRecords(s.val() || {}));
    refs.history.on("value", (s) => setHistory(s.val() || {}));
    refs.stampPresets.on("value", (s) => setStampPresets(s.val() || DEFAULT_STAMP_PRESETS));
    refs.cumulative.on("value", (s) => setCumulative(s.val() != null ? s.val() : 18));
    return () => Object.values(refs).forEach((r) => r.off());
  }, [ready]);

  if (!ready || !chores || !choreOrder || !records || !history || !stampPresets) {
    return (
      <div style={{ padding: 40, textAlign: "center", color: C.sub, fontFamily: "'Zen Kaku Gothic New', sans-serif" }}>
        読み込み中...
      </div>
    );
  }

  const recordsArray = toArray(records);
  const historyArray = toArray(history);

  const handleStamp = (recordId, text) => {
    db.ref(`kaji/records/${recordId}/thanks`).set({ from: viewer, text });
    setOpenStampFor(null);
  };

  const handleUpdateStat = (choreId, path, value) => {
    const firebasePath = path.startsWith("coef.") ? path.replace("coef.", "coef/") : path;
    db.ref(`kaji/chores/${choreId}/${firebasePath}`).set(value);
  };

  const handleAddHistory = (entry) => {
    db.ref("kaji/history").push(entry);
  };

  const handleAddChore = (name) => {
    const id = "chore_" + Date.now();
    db.ref(`kaji/chores/${id}`).set({
      name, phys: 1, mental: 1, coef: { けけ: 1.0, なな: 1.0 },
    });
    db.ref("kaji/choreOrder").set([...choreOrder, id]);
  };

  const handleMoveChore = (id, dir) => {
    const idx = choreOrder.indexOf(id);
    const target = idx + dir;
    if (target < 0 || target >= choreOrder.length) return;
    const next = [...choreOrder];
    [next[idx], next[target]] = [next[target], next[idx]];
    db.ref("kaji/choreOrder").set(next);
  };

  const handleDeleteChore = (id) => {
    db.ref(`kaji/chores/${id}`).remove();
    db.ref("kaji/choreOrder").set(choreOrder.filter((x) => x !== id));
    const toRemove = historyArray.filter((h) => h.choreId === id);
    toRemove.forEach((h) => db.ref(`kaji/history/${h.id}`).remove());
  };

  const handleAddRecord = (choreId, variantIndex) => {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, "0");
    const mm = String(now.getMinutes()).padStart(2, "0");
    const weekdayMap = ["日", "月", "火", "水", "木", "金", "土"];
    db.ref("kaji/records").push({
      day: weekdayMap[now.getDay()],
      isToday: true,
      choreId,
      actor: viewer,
      time: `${hh}:${mm}`,
      variantIndex: variantIndex != null ? variantIndex : null,
      thanks: null,
    });
  };

  const handleUpdatePreset = (actor, index, value) => {
    const current = (stampPresets[actor] || DEFAULT_STAMP_PRESETS[actor]).slice();
    current[index] = value;
    db.ref(`kaji/stampPresets/${actor}`).set(current);
  };

  const tabs = [
    { id: "home", label: "ホーム" },
    { id: "records", label: "記録" },
    { id: "report", label: "レポート" },
    { id: "review", label: "週次" },
    { id: "master", label: "マスタ" },
  ];

  return (
    <div style={{ background: C.bg, minHeight: "100%", padding: "24px 16px 90px", fontFamily: "'Zen Kaku Gothic New', sans-serif", color: C.ink }}>
      <div style={{ maxWidth: 420, margin: "0 auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}>
          <h1 style={{ fontFamily: "'Shippori Mincho', serif", fontSize: 22, fontWeight: 700, margin: 0, color: C.indigo }}>
            ふたりの家事メーター
          </h1>
          <button onClick={() => setViewer(viewer === "なな" ? "けけ" : "なな")}
            style={{ fontSize: 11, color: C.sub, background: "transparent", border: `1px solid ${C.tan}88`, borderRadius: 999, padding: "4px 10px", cursor: "pointer" }}>
            今: {viewer} ⇄
          </button>
        </div>
        <p style={{ fontSize: 12, color: C.sub, margin: "0 0 18px" }}>{viewer}として見ています</p>

        {tab === "home" && <Home records={recordsArray} chores={chores} cumulative={cumulative} />}
        {tab === "records" && (
          <Records records={recordsArray} chores={chores} choreOrder={choreOrder} viewer={viewer} stampPresets={stampPresets} onStamp={handleStamp}
            openStampFor={openStampFor} setOpenStampFor={setOpenStampFor} onAddRecord={handleAddRecord} />
        )}
        {tab === "report" && <Report records={recordsArray} chores={chores} />}
        {tab === "review" && <WeeklyReview records={recordsArray} chores={chores} cumulative={cumulative} />}
        {tab === "master" && (
          <Master
            chores={chores}
            choreOrder={choreOrder}
            records={recordsArray}
            onUpdateStat={handleUpdateStat}
            onAddChore={handleAddChore}
            onMoveChore={handleMoveChore}
            onDeleteChore={handleDeleteChore}
            history={historyArray}
            onAddHistory={handleAddHistory}
            stampPresets={stampPresets}
            onUpdatePreset={handleUpdatePreset}
          />
        )}
      </div>

      <div style={{
        position: "fixed", bottom: 0, left: 0, right: 0,
        background: C.surface, borderTop: `1px solid ${C.tan}55`,
        display: "flex", justifyContent: "center", padding: "8px 0",
      }}>
        <div style={{ display: "flex", gap: 2, maxWidth: 420, width: "100%", padding: "0 10px" }}>
          {tabs.map((t) => (
            <button key={t.id} onClick={() => setTab(t.id)}
              style={{
                flex: 1, padding: "8px 0", borderRadius: 8, border: "none", fontSize: 11,
                fontWeight: 500, cursor: "pointer",
                background: tab === t.id ? C.indigoSoft : "transparent",
                color: tab === t.id ? C.indigo : C.sub,
              }}>
              {t.label}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
