<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>今日のごはん v4.0</title>
<link rel="icon" href="data:,">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<style>
:root{
  --bg:#fbf6ee;
  --card:#ffffff;
  --accent:#e08a3c;
  --accent-dark:#c96f22;
  --accent-soft:#fbe3c8;
  --green:#5a8f5a;
  --green-soft:#e2f0e0;
  --text:#3a332b;
  --muted:#8a8074;
  --line:#eee0cc;
  --danger:#c85c5c;
  --radius:14px;
  --shadow:0 2px 10px rgba(120,90,40,0.08);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;}
#root{min-height:100vh;}
.container{max-width:520px;margin:0 auto;padding:16px;padding-bottom:90px;}
h1,h2,h3{margin:0 0 8px 0;}
h1{font-size:20px;}
h2{font-size:17px;}
h3{font-size:15px;color:var(--accent-dark);}
p{margin:4px 0;line-height:1.6;}
.muted{color:var(--muted);font-size:13px;}
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;border-radius:999px;
  border:none;font-size:14px;font-weight:600;cursor:pointer;background:var(--accent-soft);color:var(--accent-dark);}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:disabled{background:#e2d2b8;color:#fff;cursor:not-allowed;}
.btn-outline{background:transparent;border:1px solid var(--line);color:var(--text);}
.btn-danger{background:#fbe9e9;color:var(--danger);}
.btn-block{width:100%;}
.btn-sm{padding:7px 12px;font-size:12.5px;}
.row{display:flex;gap:8px;flex-wrap:wrap;}
.chip{padding:8px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:13.5px;cursor:pointer;user-select:none;}
.chip.selected{background:var(--accent);color:#fff;border-color:var(--accent);}
input[type="text"],input[type="date"],input[type="password"],textarea,select{
  display:block;width:100%;max-width:100%;min-width:0;padding:10px 12px;border-radius:10px;border:1px solid var(--line);font-size:14px;background:#fffdf9;color:var(--text);}
input[type="date"]{-webkit-appearance:none;appearance:none;}
textarea{resize:vertical;min-height:112px;font-family:inherit;}
label.field-label{font-size:12.5px;color:var(--muted);display:block;margin:10px 0 4px;}
.topbar{position:sticky;top:0;background:var(--bg);padding:14px 16px 4px;z-index:20;display:flex;justify-content:space-between;align-items:center;}
.spinner{width:26px;height:26px;border-radius:50%;border:3px solid var(--accent-soft);border-top-color:var(--accent);
  animation:spin 0.8s linear infinite;margin:20px auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.center-msg{text-align:center;color:var(--muted);padding:30px 10px;}
a{color:var(--accent-dark);}

/* 履歴 */
.record-card{border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:12px;background:#fff;position:relative;}
.record-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.record-date{font-weight:700;font-size:14.5px;}
.record-mealtype{padding:3px 10px;border-radius:999px;background:var(--green-soft);color:var(--green);font-size:12px;}
.record-text{font-size:14.5px;margin:4px 0;white-space:pre-wrap;}
.record-memo{font-size:13px;color:var(--muted);background:#fdf7ee;border-radius:10px;padding:8px 10px;margin-top:8px;white-space:pre-wrap;}
.record-del{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;}
.record-memo-empty{font-size:13px;color:var(--muted);}
.record-memo-edit textarea{min-height:80px;margin-top:6px;}
.record-memo-actions{display:flex;gap:8px;margin-top:8px;}
.memo-edit-link{background:none;border:none;color:var(--accent-dark);font-size:12.5px;cursor:pointer;padding:0;margin-top:6px;}

/* 買い物 */
.buy-add-row{display:flex;gap:8px;margin-bottom:14px;}
.buy-add-row input{flex:1;}
.buy-list{display:flex;flex-direction:column;gap:2px;}
.buy-item{display:flex;align-items:center;gap:10px;padding:10px 4px;font-size:14.5px;border-bottom:1px solid var(--line);}
.buy-item input[type="checkbox"]{width:18px;height:18px;flex-shrink:0;accent-color:var(--accent);cursor:pointer;}
.buy-item .buy-name{flex:1;cursor:pointer;user-select:none;}
.buy-item.checked .buy-name{color:var(--muted);text-decoration:line-through;}
.buy-item-del{background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;flex-shrink:0;}
.category-block{margin-top:16px;}
.category-block:first-of-type{margin-top:4px;}
.category-heading{font-size:12.5px;font-weight:700;color:var(--accent-dark);background:var(--accent-soft);
  display:inline-block;padding:3px 10px;border-radius:999px;margin-bottom:4px;}
.category-heading.checked-heading{color:var(--muted);background:#f1ece0;}
.template-list{display:flex;flex-direction:column;gap:10px;}
.template-card{display:flex;align-items:center;justify-content:space-between;gap:10px;
  border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:#fffdf9;}
.template-info{min-width:0;flex:1;}
.template-name{font-weight:700;font-size:14px;}
.template-items{font-size:12px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.template-actions{display:flex;gap:6px;flex-shrink:0;}

/* タブバー */
.tabbar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);
  display:flex;z-index:30;padding-bottom:env(safe-area-inset-bottom);}
.tabbar-item{flex:1;border:none;background:none;padding:10px 4px 8px;display:flex;flex-direction:column;
  align-items:center;gap:2px;font-size:11.5px;color:var(--muted);cursor:pointer;}
.tabbar-item .icon{font-size:20px;}
.tabbar-item.active{color:var(--accent-dark);font-weight:700;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

/* ============================================================
   今日のごはん v4.0
   「作るもの記録」+「買い物リスト」専用アプリ（AI提案なし）
   ※ FIREBASE_CONFIG は家計簿アプリ（同一Firebaseプロジェクト）と同じ値
     ※※ 元ファイルの文字化けから復元した値のため、必ず正しい値と見比べてください
   ============================================================ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyClcn7gdyPAnO3J9Ho8_yAc59vlwb7i5II",
  authDomain: "kakeibo-family-874a4.firebaseapp.com",
  databaseURL: "https://kakeibo-family-874a4-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kakeibo-family-874a4",
  storageBucket: "kakeibo-family-874a4.firebasestorage.app",
  messagingSenderId: "1037397086146",
  appId: "1:1037397086146:web:bf832935bd57e8c260505b"
};

const APP_PASSWORD = "2029";

const MEAL_TYPES = [
  { value: "breakfast", label: "朝食" },
  { value: "lunch", label: "昼食" },
  { value: "dinner", label: "夕食" },
];
function mealTypeLabel(v) {
  const found = MEAL_TYPES.find(m => m.value === v);
  return found ? found.label : v;
}

const QUICK_ITEMS = [
  "卵","牛乳","豆腐","納豆","食パン","ヨーグルト","バナナ","にんじん","玉ねぎ","キャベツ",
  "じゃがいも","もやし","豚肉","鶏肉","うどん","パスタ","チーズ","ティッシュ","ラップ","洗剤"
];

const CATEGORY_ORDER = ["野菜", "冷蔵", "肉魚", "主食", "日用品", "その他"];
const CATEGORY_RULES = [
  { name: "野菜", keywords: ["キャベツ","玉ねぎ","たまねぎ","にんじん","人参","じゃがいも","じゃが芋","もやし","トマト","きゅうり","なす","ピーマン","ほうれん草","レタス","大根","ねぎ","長ねぎ","しめじ","えのき","きのこ","ごぼう","れんこん","ブロッコリー","バナナ","果物","りんご","みかん"] },
  { name: "冷蔵", keywords: ["卵","たまご","玉子","牛乳","豆腐","納豆","ヨーグルト","チーズ","バター","味噌","みそ"] },
  { name: "肉魚", keywords: ["豚肉","鶏肉","牛肉","ひき肉","挽き肉","鮭","さけ","魚","刺身","ベーコン","ハム","ソーセージ","ウインナー"] },
  { name: "主食", keywords: ["米","お米","パン","食パン","うどん","そば","パスタ","麺","ラーメン","そうめん"] },
  { name: "日用品", keywords: ["洗剤","ラップ","ティッシュ","トイレットペーパー","キッチンペーパー","スポンジ","ゴミ袋","石鹸"] },
];
function categorize(name) {
  for (const rule of CATEGORY_RULES) {
    if (rule.keywords.some(k => name.includes(k))) return rule.name;
  }
  return "その他";
}
function slugifyName(name) {
  const s = name.replace(/[.#$\[\]\/]/g, "_").trim();
  return s || "item";
}
function parseLines(raw) {
  const seen = new Set();
  const out = [];
  raw.split("\n").map(l => l.trim()).filter(Boolean).forEach(l => {
    if (!seen.has(l)) { seen.add(l); out.push(l); }
  });
  return out;
}

/* ============================================================
   ユーティリティ
   ============================================================ */
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function nowIso() { return new Date().toISOString(); }
function randSuffix() { return Math.random().toString(36).slice(2, 8); }

/* ============================================================
   Firebase 初期化 & DB フック
   ============================================================ */
let dbInstance = null;
function getDb() {
  if (!dbInstance) {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    dbInstance = firebase.database();
  }
  return dbInstance;
}
function useDbValue(path, defaultValue) {
  const [value, setValue] = React.useState(defaultValue);
  const [loading, setLoading] = React.useState(true);
  React.useEffect(() => {
    const db = getDb();
    const ref = db.ref(path);
    const cb = snap => {
      const v = snap.val();
      setValue(v === null || v === undefined ? defaultValue : v);
      setLoading(false);
    };
    ref.on("value", cb, err => { console.error(err); setLoading(false); });
    return () => ref.off("value", cb);
  }, [path]);
  return [value, loading];
}

/* ============================================================
   買い物リスト共通ヘルパー
   ============================================================ */
async function addShoppingItems(names, currentItems) {
  if (!names || names.length === 0) return;
  const db = getDb();
  const uncheckedNames = new Set(currentItems.filter(it => !it.checked).map(it => it.name));
  const checkedByName = new Map(currentItems.filter(it => it.checked).map(it => [it.name, it]));
  const addedThisBatch = new Set();

  for (const rawName of names) {
    const name = rawName.trim();
    if (!name) continue;
    if (uncheckedNames.has(name) || addedThisBatch.has(name)) continue;

    const category = categorize(name);
    if (checkedByName.has(name)) {
      const it = checkedByName.get(name);
      await db.ref(`shoppingList/${it.id}`).update({ checked: false, checkedAt: null });
      checkedByName.delete(name);
    } else {
      const id = `item_${Date.now()}_${randSuffix()}`;
      await db.ref(`shoppingList/${id}`).set({
        name, checked: false, category, createdAt: nowIso(), checkedAt: null
      });
    }
    uncheckedNames.add(name);
    addedThisBatch.add(name);

    const histKey = slugifyName(name);
    await db.ref(`shoppingListHistory/${histKey}`).transaction(cur => ({
      name, category, lastAddedAt: nowIso(), count: (cur && cur.count || 0) + 1
    }));
  }
}

async function upsertShoppingTemplate(name, itemsList) {
  const db = getDb();
  const snap = await db.ref("shoppingTemplates").once("value");
  const val = snap.val() || {};
  const existingEntry = Object.entries(val).find(([id, t]) => t.name === name);
  if (existingEntry) {
    const [id] = existingEntry;
    await db.ref(`shoppingTemplates/${id}`).update({ items: itemsList, createdAt: nowIso() });
  } else {
    const id = `template_${Date.now()}_${randSuffix()}`;
    await db.ref(`shoppingTemplates/${id}`).set({ name, items: itemsList, createdAt: nowIso() });
  }
}

function Spinner({ label }) {
  return (
    <div className="center-msg">
      <div className="spinner"></div>
      {label && <p>{label}</p>}
    </div>
  );
}

/* ============================================================
   今日タブ：記録フォーム
   ============================================================ */
function TodayTab() {
  const [date, setDate] = React.useState(todayStr());
  const [mealType, setMealType] = React.useState("dinner");
  const [text, setText] = React.useState("");
  const [memo, setMemo] = React.useState("");
  const [saving, setSaving] = React.useState(false);
  const [savedMsg, setSavedMsg] = React.useState("");

  async function handleSave() {
    if (!text.trim()) return;
    setSaving(true);
    setSavedMsg("");
    try {
      const db = getDb();
      const id = `record_${date.replace(/-/g, "")}_${randSuffix()}`;
      await db.ref(`mealRecords/${id}`).set({
        date,
        mealType,
        text: text.trim(),
        memo: memo.trim(),
        createdAt: nowIso()
      });
      setText("");
      setMemo("");
      setSavedMsg("保存しました。");
      setTimeout(() => setSavedMsg(""), 2000);
    } catch (e) {
      console.error(e);
      setSavedMsg("保存に失敗しました。");
    } finally {
      setSaving(false);
    }
  }

  return (
    <div className="card">
      <h2>今日作るものを記録</h2>

      <label className="field-label">日付</label>
      <input type="date" value={date} onChange={e => setDate(e.target.value)} />

      <label className="field-label">食事タイプ</label>
      <div className="row">
        {MEAL_TYPES.map(m => (
          <span key={m.value}
                className={"chip" + (mealType === m.value ? " selected" : "")}
                onClick={() => setMealType(m.value)}>
            {m.label}
          </span>
        ))}
      </div>

      <label className="field-label">作るもの</label>
      <textarea value={text} onChange={e => setText(e.target.value)}
                placeholder="例：カレー、サラダ" />

      <label className="field-label">メモ（任意）</label>
      <textarea value={memo} onChange={e => setMemo(e.target.value)}
                placeholder="例：カイくんがよく食べた。次回は少し薄味。" />

      {savedMsg && <p className="muted" style={{color: savedMsg.includes("失敗") ? "var(--danger)" : "var(--green)"}}>{savedMsg}</p>}

      <button className="btn btn-primary btn-block" style={{marginTop:16}}
              disabled={!text.trim() || saving} onClick={handleSave}>
        {saving ? "保存中…" : "保存する"}
      </button>
    </div>
  );
}

/* ============================================================
   履歴タブ
   ============================================================ */
function RecordCard({ record, onDelete }) {
  const [editing, setEditing] = React.useState(false);
  const [memoDraft, setMemoDraft] = React.useState(record.memo || "");
  const [saving, setSaving] = React.useState(false);

  const [showTemplateForm, setShowTemplateForm] = React.useState(false);
  const [templateText, setTemplateText] = React.useState("");
  const [templateSaving, setTemplateSaving] = React.useState(false);
  const [templateMsg, setTemplateMsg] = React.useState("");

  function startEdit() {
    setMemoDraft(record.memo || "");
    setEditing(true);
  }

  async function handleSaveMemo() {
    setSaving(true);
    try {
      await getDb().ref(`mealRecords/${record.id}/memo`).set(memoDraft.trim());
      setEditing(false);
    } catch (e) {
      console.error(e);
      alert("メモの保存に失敗しました。");
    } finally {
      setSaving(false);
    }
  }

  function openTemplateForm() {
    setTemplateText("");
    setTemplateMsg("");
    setShowTemplateForm(true);
  }

  async function handleSaveTemplate() {
    const itemsList = parseLines(templateText);
    if (itemsList.length === 0) return;
    setTemplateSaving(true);
    try {
      await upsertShoppingTemplate(record.text, itemsList);
      setTemplateMsg(`テンプレート「${record.text}」に保存しました。`);
      setShowTemplateForm(false);
    } catch (e) {
      console.error(e);
      alert("テンプレートの保存に失敗しました。");
    } finally {
      setTemplateSaving(false);
    }
  }

  return (
    <div className="record-card">
      <button className="record-del" onClick={() => onDelete(record.id)} aria-label="削除">✕</button>
      <div className="record-top">
        <span className="record-date">{record.date}</span>
        <span className="record-mealtype">{mealTypeLabel(record.mealType)}</span>
      </div>
      <div className="record-text">{record.text}</div>

      {!editing && record.memo && <div className="record-memo">{record.memo}</div>}
      {!editing && !record.memo && (
        <button className="memo-edit-link" onClick={startEdit}>メモを追加（味付けや感想等の記録）</button>
      )}
      {!editing && record.memo && (
        <button className="memo-edit-link" onClick={startEdit}>メモを編集</button>
      )}
      {editing && (
        <div className="record-memo-edit">
          <textarea value={memoDraft} onChange={e => setMemoDraft(e.target.value)}
                    placeholder="メモを入力" />
          <div className="record-memo-actions">
            <button className="btn btn-primary btn-sm" disabled={saving} onClick={handleSaveMemo}>
              {saving ? "保存中…" : "保存"}
            </button>
            <button className="btn btn-outline btn-sm" onClick={() => setEditing(false)}>キャンセル</button>
          </div>
        </div>
      )}

      {!showTemplateForm && (
        <button className="memo-edit-link" onClick={openTemplateForm}>この料理の買うものを登録</button>
      )}
      {templateMsg && <p className="muted" style={{color:"var(--green)"}}>{templateMsg}</p>}
      {showTemplateForm && (
        <div className="record-memo-edit">
          <label className="field-label">「{record.text}」の買うもの（1行に1品目）</label>
          <textarea value={templateText} onChange={e => setTemplateText(e.target.value)}
                    placeholder={"じゃがいも\nにんじん\n玉ねぎ\nカレールー\n豚肉"} />
          <div className="record-memo-actions">
            <button className="btn btn-primary btn-sm" disabled={templateSaving || parseLines(templateText).length === 0} onClick={handleSaveTemplate}>
              {templateSaving ? "保存中…" : "テンプレートに保存"}
            </button>
            <button className="btn btn-outline btn-sm" onClick={() => setShowTemplateForm(false)}>キャンセル</button>
          </div>
        </div>
      )}
    </div>
  );
}

function HistoryTab() {
  const [mealRecords, loading] = useDbValue("mealRecords", {});

  const records = React.useMemo(() => {
    return Object.entries(mealRecords || {})
      .map(([id, r]) => ({ id, ...r }))
      .sort((a, b) => {
        if (a.date !== b.date) return a.date < b.date ? 1 : -1;
        return (a.createdAt || "") < (b.createdAt || "") ? 1 : -1;
      });
  }, [mealRecords]);

  async function handleDelete(id) {
    if (!window.confirm("この記録を削除しますか？")) return;
    try {
      await getDb().ref(`mealRecords/${id}`).remove();
    } catch (e) {
      console.error(e);
      alert("削除に失敗しました。");
    }
  }

  if (loading) return <Spinner label="読み込み中…" />;

  if (records.length === 0) {
    return <p className="center-msg">まだ記録がありません。<br/>「今日」タブから記録してみましょう。</p>;
  }

  return (
    <div>
      {records.map(r => (
        <RecordCard key={r.id} record={r} onDelete={handleDelete} />
      ))}
    </div>
  );
}

/* ============================================================
   買い物タブ
   ============================================================ */
function AddBox({ items, onAdded }) {
  const [text, setText] = React.useState("");
  const [adding, setAdding] = React.useState(false);

  async function handleAdd() {
    const names = parseLines(text);
    if (names.length === 0) return;
    setAdding(true);
    try {
      await addShoppingItems(names, items);
      setText("");
      onAdded && onAdded();
    } catch (e) {
      console.error(e);
      alert("追加に失敗しました。");
    } finally {
      setAdding(false);
    }
  }

  return (
    <div className="card">
      <h2>買うものを追加</h2>
      <textarea value={text} onChange={e => setText(e.target.value)}
                placeholder={"例：卵\n牛乳\n豆腐\n（1行に1品目、複数行まとめてOK）"} />
      <button className="btn btn-primary btn-block" style={{marginTop:10}}
              disabled={parseLines(text).length === 0 || adding} onClick={handleAdd}>
        {adding ? "追加中…" : "追加する"}
      </button>
    </div>
  );
}

function QuickAddChips({ items }) {
  const [busy, setBusy] = React.useState(false);
  async function handleTap(name) {
    setBusy(true);
    try { await addShoppingItems([name], items); }
    catch (e) { console.error(e); }
    finally { setBusy(false); }
  }
  return (
    <div className="card">
      <h3>よく買うもの</h3>
      <div className="row">
        {QUICK_ITEMS.map(name => (
          <span key={name} className="chip" onClick={() => !busy && handleTap(name)}>{name}</span>
        ))}
      </div>
    </div>
  );
}

function RecentHistoryChips({ items }) {
  const [history, loading] = useDbValue("shoppingListHistory", {});
  const recent = React.useMemo(() => {
    return Object.values(history || {})
      .sort((a, b) => (a.lastAddedAt || "") < (b.lastAddedAt || "") ? 1 : -1)
      .slice(0, 20);
  }, [history]);

  if (loading || recent.length === 0) return null;

  return (
    <div className="card">
      <h3>最近追加したものから</h3>
      <div className="row">
        {recent.map(h => (
          <span key={h.name} className="chip" onClick={() => addShoppingItems([h.name], items)}>{h.name}</span>
        ))}
      </div>
    </div>
  );
}

function TemplatesSection({ items }) {
  const [templates, loading] = useDbValue("shoppingTemplates", {});
  const [showForm, setShowForm] = React.useState(false);
  const [name, setName] = React.useState("");
  const [itemsText, setItemsText] = React.useState("");
  const [saving, setSaving] = React.useState(false);

  const templateList = React.useMemo(() => {
    return Object.entries(templates || {})
      .map(([id, t]) => ({ id, ...t }))
      .sort((a, b) => (a.createdAt || "") < (b.createdAt || "") ? 1 : -1);
  }, [templates]);

  async function handleUse(t) {
    await addShoppingItems(t.items || [], items);
  }
  async function handleDelete(id) {
    if (!window.confirm("このテンプレートを削除しますか？")) return;
    await getDb().ref(`shoppingTemplates/${id}`).remove();
  }
  async function handleCreate() {
    const list = parseLines(itemsText);
    if (!name.trim() || list.length === 0) return;
    setSaving(true);
    try {
      await upsertShoppingTemplate(name.trim(), list);
      setName("");
      setItemsText("");
      setShowForm(false);
    } catch (e) {
      console.error(e);
      alert("保存に失敗しました。");
    } finally {
      setSaving(false);
    }
  }

  return (
    <div className="card">
      <h3>テンプレート</h3>
      {loading ? (
        <Spinner label="読み込み中…" />
      ) : templateList.length === 0 ? (
        <p className="muted">まだテンプレートはありません。</p>
      ) : (
        <div className="template-list">
          {templateList.map(t => (
            <div className="template-card" key={t.id}>
              <div className="template-info">
                <div className="template-name">{t.name}</div>
                <div className="template-items muted">{(t.items || []).join("、")}</div>
              </div>
              <div className="template-actions">
                <button className="btn btn-sm btn-primary" onClick={() => handleUse(t)}>追加</button>
                <button className="btn btn-sm btn-outline" onClick={() => handleDelete(t.id)}>削除</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {!showForm && (
        <button className="btn btn-outline btn-block" style={{marginTop:12}} onClick={() => setShowForm(true)}>
          + 新しいテンプレート
        </button>
      )}
      {showForm && (
        <div style={{marginTop:12}}>
          <label className="field-label">テンプレート名</label>
          <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="例：朝食セット" />
          <label className="field-label">品目（1行に1品目）</label>
          <textarea value={itemsText} onChange={e => setItemsText(e.target.value)}
                    placeholder={"卵\n牛乳\n食パン\nヨーグルト"} />
          <div className="record-memo-actions">
            <button className="btn btn-primary btn-sm" disabled={saving || !name.trim() || parseLines(itemsText).length === 0} onClick={handleCreate}>
              {saving ? "保存中…" : "保存"}
            </button>
            <button className="btn btn-outline btn-sm" onClick={() => setShowForm(false)}>キャンセル</button>
          </div>
        </div>
      )}
    </div>
  );
}

function ShoppingTab() {
  const [shoppingList, loading] = useDbValue("shoppingList", {});

  const items = React.useMemo(() => {
    return Object.entries(shoppingList || {})
      .map(([id, it]) => ({ id, ...it }))
      .sort((a, b) => (a.createdAt || "") < (b.createdAt || "") ? -1 : 1);
  }, [shoppingList]);

  const uncheckedByCategory = React.useMemo(() => {
    const map = {};
    CATEGORY_ORDER.forEach(c => map[c] = []);
    items.filter(it => !it.checked).forEach(it => {
      const cat = CATEGORY_ORDER.includes(it.category) ? it.category : "その他";
      map[cat].push(it);
    });
    return map;
  }, [items]);

  const checkedItems = React.useMemo(() => {
    return items.filter(it => it.checked)
      .sort((a, b) => (a.checkedAt || "") < (b.checkedAt || "") ? 1 : -1);
  }, [items]);

  async function handleToggle(item) {
    try {
      await getDb().ref(`shoppingList/${item.id}`).update({
        checked: !item.checked,
        checkedAt: !item.checked ? nowIso() : null
      });
    } catch (e) {
      console.error(e);
    }
  }

  async function handleDeleteOne(id) {
    try {
      await getDb().ref(`shoppingList/${id}`).remove();
    } catch (e) {
      console.error(e);
    }
  }

  async function handleDeleteChecked() {
    if (checkedItems.length === 0) return;
    if (!window.confirm(`チェック済みの${checkedItems.length}件を削除しますか？`)) return;
    try {
      const updates = {};
      checkedItems.forEach(it => { updates[`shoppingList/${it.id}`] = null; });
      await getDb().ref().update(updates);
    } catch (e) {
      console.error(e);
      alert("削除に失敗しました。");
    }
  }

  const hasUnchecked = CATEGORY_ORDER.some(c => uncheckedByCategory[c].length > 0);

  return (
    <div>
      <AddBox items={items} />
      <QuickAddChips items={items} />
      <RecentHistoryChips items={items} />
      <TemplatesSection items={items} />

      <div className="card">
        <h2>買い物リスト</h2>
        {loading ? (
          <Spinner label="読み込み中…" />
        ) : !hasUnchecked && checkedItems.length === 0 ? (
          <p className="muted">買うものはまだありません。</p>
        ) : (
          <React.Fragment>
            {!hasUnchecked && <p className="muted">未購入のものはありません。</p>}
            {CATEGORY_ORDER.map(cat => (
              uncheckedByCategory[cat].length > 0 && (
                <div key={cat} className="category-block">
                  <div className="category-heading">{cat}</div>
                  <div className="buy-list">
                    {uncheckedByCategory[cat].map(it => (
                      <div className="buy-item" key={it.id}>
                        <input type="checkbox" checked={false} onChange={() => handleToggle(it)} />
                        <span className="buy-name" onClick={() => handleToggle(it)}>{it.name}</span>
                        <button className="buy-item-del" onClick={() => handleDeleteOne(it.id)} aria-label="削除">✕</button>
                      </div>
                    ))}
                  </div>
                </div>
              )
            ))}

            {checkedItems.length > 0 && (
              <div className="category-block">
                <div className="category-heading checked-heading">購入済み（{checkedItems.length}）</div>
                <div className="buy-list">
                  {checkedItems.map(it => (
                    <div className="buy-item checked" key={it.id}>
                      <input type="checkbox" checked={true} onChange={() => handleToggle(it)} />
                      <span className="buy-name" onClick={() => handleToggle(it)}>{it.name}</span>
                      <button className="buy-item-del" onClick={() => handleDeleteOne(it.id)} aria-label="削除">✕</button>
                    </div>
                  ))}
                </div>
                <button className="btn btn-outline btn-block" style={{marginTop:12}} onClick={handleDeleteChecked}>
                  チェック済みをまとめて削除（{checkedItems.length}件）
                </button>
              </div>
            )}
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

/* ============================================================
   認証ゲート
   ============================================================ */
function AuthGate({ children }) {
  const [authed, setAuthed] = React.useState(false);
  const [checked, setChecked] = React.useState(false);
  const [input, setInput] = React.useState("");
  const [error, setError] = React.useState("");

  React.useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const urlKey = params.get("key");
    if (urlKey) localStorage.setItem("kondate-auth", urlKey);
    const stored = localStorage.getItem("kondate-auth") || localStorage.getItem("kakeibo-auth");
    if (stored === APP_PASSWORD) setAuthed(true);
    setChecked(true);
  }, []);

  function handleSubmit(e) {
    e.preventDefault();
    if (input === APP_PASSWORD) {
      localStorage.setItem("kondate-auth", input);
      setAuthed(true);
    } else {
      setError("パスワードが違います。");
    }
  }

  if (!checked) return <Spinner />;
  if (!authed) {
    return (
      <div className="container" style={{paddingTop:60}}>
        <div className="card">
          <h2>今日のごはん</h2>
          <p className="muted">パスワードを入力してください</p>
          <form onSubmit={handleSubmit}>
            <input type="password" value={input} onChange={e => setInput(e.target.value)} />
            {error && <p style={{color:"var(--danger)"}}>{error}</p>}
            <button type="submit" className="btn btn-primary btn-block" style={{marginTop:10}}>入る</button>
          </form>
        </div>
      </div>
    );
  }
  return children;
}

/* ============================================================
   タブバー
   ============================================================ */
const TABS = [
  { key: "today", label: "今日", icon: "📝" },
  { key: "history", label: "履歴", icon: "📖" },
  { key: "shopping", label: "買い物", icon: "🛒" },
];

function TabBar({ active, onChange }) {
  return (
    <div className="tabbar">
      {TABS.map(t => (
        <button key={t.key}
                className={"tabbar-item" + (active === t.key ? " active" : "")}
                onClick={() => onChange(t.key)}>
          <span className="icon">{t.icon}</span>
          <span>{t.label}</span>
        </button>
      ))}
    </div>
  );
}

/* ============================================================
   メインアプリ
   ============================================================ */
function MainApp() {
  const [tab, setTab] = React.useState("today");

  return (
    <div>
      <div className="topbar">
        <h1>🍚 今日のごはん</h1>
      </div>
      <div className="container">
        {tab === "today" && <TodayTab />}
        {tab === "history" && <HistoryTab />}
        {tab === "shopping" && <ShoppingTab />}
      </div>
      <TabBar active={tab} onChange={setTab} />
    </div>
  );
}

function App() {
  return <AuthGate><MainApp /></AuthGate>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
